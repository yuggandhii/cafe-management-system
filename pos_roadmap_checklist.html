
<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0 2rem;font-family:var(--font-sans)}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:12px}
.prog-wrap{flex:1;height:5px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--color-background-success);border-radius:3px;transition:width .25s}
.prog-label{font-size:13px;font-weight:500;color:var(--color-text-secondary);min-width:36px;text-align:right}
.reset{font-size:12px;color:var(--color-text-tertiary);background:none;border:0.5px solid var(--color-border-tertiary);border-radius:6px;padding:3px 10px;cursor:pointer}
.reset:hover{background:var(--color-background-secondary)}
.section{margin-bottom:1.25rem}
.section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.snum{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:500;flex-shrink:0}
.task{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:8px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);margin-bottom:4px;cursor:pointer;transition:background .1s}
.task:hover{background:var(--color-background-secondary)}
.task.done .txt{text-decoration:line-through;color:var(--color-text-tertiary)}
.box{width:16px;height:16px;border-radius:4px;border:0.5px solid var(--color-border-secondary);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.box.on{background:var(--color-background-success);border-color:var(--color-border-success)}
.txt{font-size:13px;color:var(--color-text-primary);line-height:1.45;flex:1}
</style>
<div class="wrap">
<div class="top">
  <span style="font-size:13px;color:var(--color-text-secondary)">POS Cafe build checklist</span>
  <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <span class="prog-label" id="pl">0%</span>
  <button class="reset" onclick="reset()">reset</button>
</div>
<div id="root"></div>
</div>
<script>
const SECTIONS=[
{n:1,color:'#E6F1FB',tc:'#0C447C',title:'Git setup',tasks:[

]},

const KEY='pos_roadmap_v1';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};}}
function save(s){try{localStorage.setItem(KEY,JSON.stringify(s));}catch(e){}}
let state=load();
const total=SECTIONS.reduce((a,s)=>a+s.tasks.length,0);
function pct(){return Math.round(Object.values(state).filter(Boolean).length/total*100);}
function updateProg(){const p=pct();document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=p+'%';}
function toggle(id){state[id]=!state[id];save(state);const el=document.getElementById('tk-'+id);const bx=el.querySelector('.box');el.classList.toggle('done',!!state[id]);bx.classList.toggle('on',!!state[id]);updateProg();}
function reset(){state={};save(state);document.querySelectorAll('.task').forEach(e=>e.classList.remove('done'));document.querySelectorAll('.box').forEach(e=>e.classList.remove('on'));updateProg();}
const TICK=`<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="var(--color-text-success)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
document.getElementById('root').innerHTML=SECTIONS.map(s=>{
const tasks=s.tasks.map(t=>{const done=!!state[t.id];return`<div class="task${done?' done':''}" id="tk-${t.id}" onclick="toggle('${t.id}')"><div class="box${done?' on':''}">${done?TICK:''}</div><span class="txt">${t.t}</span></div>`;}).join('');
return`<div class="section"><div class="section-title"><span class="snum" style="background:${s.color};color:${s.tc}">${s.n}</span>${s.title}</div>${tasks}</div>`;
}).join('');
updateProg();
</script>
