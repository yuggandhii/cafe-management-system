services:
  - type: web
    name: cafe-management-backend
    env: node
    buildCommand: npm install && cd frontend && npm install && npm run build && cd ../backend && npm install && npm run migrate && npm run seed
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: cafe-db
    databaseName: pos_cafe
    user: postgres
